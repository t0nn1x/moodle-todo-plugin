version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: moodle_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  web:
    image: php:7.4-apache
    container_name: moodle_web
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - moodle_data:/var/www/moodledata
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y libzip-dev libicu-dev libxml2-dev libpng-dev libjpeg-dev libfreetype6-dev libonig-dev &&
      docker-php-ext-configure gd --with-freetype --with-jpeg &&
      docker-php-ext-install pdo pdo_mysql mysqli zip intl xml gd mbstring opcache &&
      a2enmod rewrite &&
      chown -R www-data:www-data /var/www/moodledata &&
      chmod -R 755 /var/www/moodledata &&
      apache2-foreground
      "

volumes:
  db_data:
  moodle_data:
